bundle:
  name: dot-graph-core
  version: 0.2.0
  description: DOT/Graphviz graph authoring, analysis, and intelligence capabilities

tools:
  - module: tool-dot-graph
    source: git+https://github.com/microsoft/amplifier-bundle-dot-graph@main#subdirectory=modules/tool-dot-graph

  # Register dot-graph bundle skills for discovery
  - module: tool-skills
    source: git+https://github.com/microsoft/amplifier-bundle-skills@main#subdirectory=modules/tool-skills
    config:
      skills:
        - "git+https://github.com/microsoft/amplifier-bundle-dot-graph@main#subdirectory=skills"

agents:
  include:
    - dot-graph:dot-author
    - dot-graph:diagram-reviewer

context:
  include:
    - dot-graph:context/dot-awareness.md
