name: "discovery-pipeline"
description: >
  Thin orchestrator for Parallax Discovery codebase analysis.
  Runs a 3-stage pipeline: scan (prescan + topic selection with approval gate),
  strategies (delegates to strategy-topdown and/or strategy-bottomup sub-recipes
  based on the 'strategies' context variable), and combine (merges top-down and
  bottom-up results when both strategies were run). Backward-compatible context
  variables; adds 'strategies' to select which investigation strategy to run.
version: "1.0.0"
author: "DOT Graph Bundle"
tags: ["discovery", "pipeline", "architecture", "dot-graph", "multi-agent"]

context:
  repo_path: ""                         # Required: path to target repository
  fidelity: "standard"                  # Optional: quick | standard | deep (default: standard)
  output_dir: "{{repo_path}}/.discovery" # Optional: defaults to {{repo_path}}/.discovery
  render_png: "true"                    # Optional: render assembled DOTs to PNG (default: true)
  strategies: "both"                    # Optional: topdown | bottomup | both (default: both)

stages:
  # ---------------------------------------------------------------------------
  # Stage 1: Scan — prescan repo structure and select investigation topics
  # ---------------------------------------------------------------------------
  - name: "scan"
    steps:
      # -----------------------------------------------------------------------
      # Step 1: Structural scan — run prescan to map repository layout
      # Invokes prescan via amplifier_module_tool_dot_graph.prescan and writes
      # the result to {{output_dir}}/prescan-result.json.
      # -----------------------------------------------------------------------
      - id: "structural-scan"
        type: "bash"
        output: "scan_result"
        parse_json: true
        timeout: 60
        command: |
          output_dir="{{output_dir}}"
          mkdir -p "$output_dir"
          python3 - <<'PYEOF'
          import sys, json, os
          sys.path.insert(0, 'modules/tool-dot-graph')
          try:
              from amplifier_module_tool_dot_graph import prescan
              result = prescan.prescan_repo('{{repo_path}}')
          except Exception as e:
              print(f'WARNING: prescan module unavailable ({e}), falling back to basic directory listing', file=sys.stderr)
              import pathlib
              repo_path = pathlib.Path('{{repo_path}}')
              files = [str(f.relative_to(repo_path)) for f in repo_path.rglob('*') if f.is_file() and '.git' not in str(f)]
              result = {'success': True, 'repo_path': str(repo_path), 'total_files': len(files), 'modules': [], 'languages': {}, 'build_manifests': [], 'entry_points': []}
          output_dir_path = '{{output_dir}}'
          os.makedirs(output_dir_path, exist_ok=True)
          with open(output_dir_path + '/prescan-result.json', 'w') as f:
              json.dump(result, f, indent=2)
          print(json.dumps({'success': result.get('success', True), 'total_files': result.get('total_files', 0), 'modules': len(result.get('modules', []))}, indent=2))
          PYEOF

      # -----------------------------------------------------------------------
      # Step 2: Topic selection — choose 3-7 investigation topics
      # Dispatches the discovery-prescan agent to select topics based on the
      # structural scan result. Writes topics.json to the output directory.
      # -----------------------------------------------------------------------
      - id: "topic-select"
        agent: "dot-graph:discovery-prescan"
        output: "topics"
        parse_json: true
        timeout: 600
        prompt: |
          You are the discovery-prescan agent for a Parallax Discovery pipeline run.

          Your task: analyze the prescan results and select 3-7 investigation
          topics that would best illuminate the architecture of this repository.

          Repository: {{repo_path}}
          Fidelity tier: {{fidelity}}
          Output directory: {{output_dir}}
          Prescan result file: {{output_dir}}/prescan-result.json

          Topic count guidelines:
          - standard fidelity: select 3-5 topics
          - deep fidelity: select 5-7 topics

          For each topic, identify a meaningful architectural concern, mechanism, or
          subsystem — something that, if well-understood, would clarify how the
          repository works as a whole.

          Write the topics to {{output_dir}}/topics.json as a JSON array.
          Return your response as a JSON array only (no markdown, no explanation):
          [
            {
              "name": "Human-readable topic name",
              "slug": "kebab-case-slug",
              "description": "One sentence describing what this topic covers and why it matters"
            },
            ...
          ]

    approval_gate:
      required: true
      prompt: |
        Prescan complete. Review investigation topics before strategies begin.

        Repository:  {{repo_path}}
        Fidelity:    {{fidelity}}
        Output dir:  {{output_dir}}
        Strategies:  {{strategies}}

        Scan result summary:
        {{scan_result}}

        Selected investigation topics:
        {{topics}}

        Type APPROVE to proceed with strategy investigation, or DENY to cancel.

  # ---------------------------------------------------------------------------
  # Stage 2: Strategies — run top-down and/or bottom-up strategy sub-recipes
  # ---------------------------------------------------------------------------
  - name: "strategies"
    steps:
      # -----------------------------------------------------------------------
      # Step 1: Top-down investigation strategy
      # Runs when strategies is 'topdown' or 'both'.
      # Writes results to {{output_dir}}/investigation/topdown/.
      # -----------------------------------------------------------------------
      - id: "run-topdown"
        type: "recipe"
        recipe: "@dot-graph:recipes/strategy-topdown.yaml"
        condition: "{{strategies}} == 'topdown' or {{strategies}} == 'both'"
        context:
          repo_path: "{{repo_path}}"
          output_dir: "{{output_dir}}/investigation/topdown"
          fidelity: "{{fidelity}}"
          render_png: "{{render_png}}"
          parent_topics_available: "true"
        output: "topdown_result"

      # -----------------------------------------------------------------------
      # Step 2: Bottom-up investigation strategy
      # Runs when strategies is 'bottomup' or 'both'.
      # Writes results to {{output_dir}}/investigation/bottomup/.
      # -----------------------------------------------------------------------
      - id: "run-bottomup"
        type: "recipe"
        recipe: "@dot-graph:recipes/strategy-bottomup.yaml"
        condition: "{{strategies}} == 'bottomup' or {{strategies}} == 'both'"
        context:
          repo_path: "{{repo_path}}"
          output_dir: "{{output_dir}}/investigation/bottomup"
          fidelity: "{{fidelity}}"
          render_png: "{{render_png}}"
        output: "bottomup_result"

  # ---------------------------------------------------------------------------
  # Stage 3: Combine — merge top-down and bottom-up results (when both ran)
  # ---------------------------------------------------------------------------
  - name: "combine"
    steps:
      # -----------------------------------------------------------------------
      # Step 1: Combine strategy results
      # Runs only when strategies is 'both'. Merges top-down and bottom-up
      # investigation outputs into a unified discovery output.
      # -----------------------------------------------------------------------
      - id: "run-combine"
        type: "recipe"
        recipe: "@dot-graph:recipes/discovery-combine.yaml"
        condition: "{{strategies}} == 'both'"
        context:
          repo_path: "{{repo_path}}"
          topdown_dir: "{{output_dir}}/investigation/topdown"
          bottomup_dir: "{{output_dir}}/investigation/bottomup"
          output_dir: "{{output_dir}}/output"
          render_png: "{{render_png}}"
        output: "combine_result"

final_output: "combine_result"
