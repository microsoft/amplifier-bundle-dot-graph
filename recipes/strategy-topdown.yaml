name: "strategy-topdown"
description: >
  Standalone top-down conceptual discovery strategy for Parallax Discovery.
  Runs a fully unattended 3-stage pipeline (scan, investigate, synthesize) that
  discovers codebase architecture from the top down — scanning the high-level
  structure first, selecting investigation topics, dispatching parallel agent
  teams per topic, then synthesizing findings into subsystem and overview DOT
  diagrams. Unlike the interactive discovery-pipeline, this strategy has no
  approval gates and is suitable for automated or background analysis.
version: "1.0.0"
author: "DOT Graph Bundle"
tags: ["discovery", "strategy", "top-down", "dot-graph", "multi-agent"]

recursion:
  max_depth: 3
  max_total_steps: 100

context:
  repo_path: ""             # Required: path to target repository
  output_dir: "{{repo_path}}/.discovery/investigation/topdown"  # Optional: defaults to {{repo_path}}/.discovery/investigation/topdown
  fidelity: "standard"      # Optional: quick | standard | deep (default: standard)
  parent_topics_available: ""  # Set to "true" by parent pipeline when topics already selected

stages:
  # ---------------------------------------------------------------------------
  # Stage 1: Scan — discover codebase structure and select investigation topics
  # No approval gate — strategy-topdown runs fully unattended
  # ---------------------------------------------------------------------------
  - name: "scan"
    steps:
      # -----------------------------------------------------------------------
      # Step 1: Structural scan — map the repository layout
      # Invokes prescan via amplifier_module_tool_dot_graph.prescan with
      # fallback to basic directory listing.
      # Resolves default output_dir and writes prescan-result.json.
      # -----------------------------------------------------------------------
      - id: "structural-scan"
        condition: "{{parent_topics_available}} != 'true'"
        type: "bash"
        output: "scan_result"
        parse_json: true
        timeout: 60
        command: |
          python3 - <<'EOF'
          import json
          import os
          from pathlib import Path

          repo_path = "{{repo_path}}"
          output_dir = "{{output_dir}}"

          # Resolve default output_dir if empty
          if not output_dir:
              output_dir = str(Path(repo_path) / ".discovery" / "investigation" / "topdown")

          # Create output directory
          Path(output_dir).mkdir(parents=True, exist_ok=True)

          result = {
              "repo_path": repo_path,
              "output_dir": output_dir,
              "structure": {},
              "error": None,
          }

          # Try amplifier_module_tool_dot_graph.prescan
          try:
              from amplifier_module_tool_dot_graph import prescan
              structure = prescan.prescan_repo(repo_path)
              result["structure"] = structure
          except Exception as e:
              # Fallback: basic directory listing
              try:
                  top_level = []
                  for entry in sorted(Path(repo_path).iterdir()):
                      if entry.name.startswith("."):
                          continue
                      top_level.append({
                          "name": entry.name,
                          "type": "dir" if entry.is_dir() else "file",
                      })
                  result["structure"] = {"top_level": top_level, "source": "fallback"}
                  result["error"] = f"prescan unavailable ({e}), used fallback listing"
              except Exception as e2:
                  result["error"] = f"structural scan failed: {e2}"

          # Write prescan-result.json
          prescan_path = Path(output_dir) / "prescan-result.json"
          prescan_path.write_text(json.dumps(result, indent=2))

          print(json.dumps(result))
          EOF

      # -----------------------------------------------------------------------
      # Step 2: Topic selection — choose 3–7 investigation topics
      # Dispatches the discovery-prescan agent to select topics based on the
      # structural scan. Standard: 3-5 topics; deep: 5-7 topics.
      # -----------------------------------------------------------------------
      - id: "topic-select"
        condition: "{{parent_topics_available}} != 'true'"
        agent: "dot-graph:discovery-prescan"
        output: "topics"
        parse_json: true
        timeout: 600
        prompt: |
          You are the discovery-prescan agent for a top-down discovery strategy run.

          Your task: analyze the structural scan results and select 3-7 investigation
          topics that would best illuminate the architecture of this repository.

          Repository: {{repo_path}}
          Fidelity tier: {{fidelity}}
          Output directory: {{output_dir}}

          Structural scan results:
          {{scan_result}}

          Topic count guidelines:
          - standard fidelity: select 3-5 topics
          - deep fidelity: select 5-7 topics

          For each topic, identify a meaningful architectural concern, mechanism, or
          subsystem — something that, if well-understood, would clarify how the
          repository works as a whole.

          Return your response as a JSON array only (no markdown, no explanation):
          [
            {
              "name": "Human-readable topic name",
              "slug": "kebab-case-slug",
              "description": "One sentence describing what this topic covers and why it matters"
            },
            ...
          ]

      # -----------------------------------------------------------------------
      # Step 3a: Save topics from scan — STANDALONE mode only
      # Runs when parent_topics_available is not "true" (topic-select ran
      # and set {{topics}}). Writes topics.json and outputs the array for
      # downstream stages. Split from 3b to avoid eager {{topics}}
      # substitution when parent topics are available and topic-select was
      # skipped.
      # -----------------------------------------------------------------------
      - id: "save-topics-from-scan"
        condition: "{{parent_topics_available}} != 'true'"
        type: "bash"
        output: "topics"
        parse_json: true
        command: |
          python3 - <<'EOF'
          import json
          from pathlib import Path

          output_dir = "{{output_dir}}"
          topics_json = r"""{{topics}}"""
          try:
              topics = json.loads(topics_json)
          except Exception:
              import ast
              topics = ast.literal_eval(topics_json)
          topics_path = Path(output_dir) / "topics.json"
          topics_path.parent.mkdir(parents=True, exist_ok=True)
          topics_path.write_text(json.dumps(topics, indent=2))
          print(json.dumps(topics))
          EOF

      # -----------------------------------------------------------------------
      # Step 3b: Save topics from file — SUB-RECIPE mode only
      # Runs when parent_topics_available is "true" (parent pipeline already
      # wrote topics.json during its scan stage).
      # Constructs the path from {{repo_path}} directly — avoids nested
      # template resolution issues ({{output_dir}} contains {{repo_path}}).
      # Does NOT reference {{topics}} — avoids Undefined variable error when
      # topic-select was skipped.
      # -----------------------------------------------------------------------
      - id: "save-topics-from-file"
        condition: "{{parent_topics_available}} == 'true'"
        type: "bash"
        output: "topics"
        parse_json: true
        command: |
          python3 - <<'EOF'
          import json, os
          from pathlib import Path

          # Construct path from repo_path directly — avoids nested template issues
          repo_path = "{{repo_path}}"

          # Topics written by parent pipeline to the standard location
          topics_file = os.path.join(repo_path, '.discovery', 'topics.json')

          if not Path(topics_file).exists():
              print(f"WARNING: Expected topics at {topics_file} but not found", file=__import__('sys').stderr)
              # Try alternate location
              alt = os.path.join(repo_path, '.discovery', 'investigation', 'topics.json')
              if Path(alt).exists():
                  topics_file = alt
              else:
                  print("[]")  # Empty list fallback
                  raise SystemExit(0)

          output_dir = "{{output_dir}}"
          Path(output_dir).mkdir(parents=True, exist_ok=True)
          dest = Path(output_dir) / "topics.json"

          topics = json.loads(Path(topics_file).read_text())
          dest.write_text(json.dumps(topics, indent=2))
          print(json.dumps(topics))
          EOF

  # ---------------------------------------------------------------------------
  # Stage 2: Investigate — dispatch agent teams per topic
  # ---------------------------------------------------------------------------
  - name: "investigate"
    steps:
      # -----------------------------------------------------------------------
      # Step 1: Prepare topic directories
      # Creates the per-topic directory structure under output_dir/modules/{slug}/
      # including subdirectories for each agent output.
      # -----------------------------------------------------------------------
      - id: "prepare-topics"
        type: "bash"
        output: "prep_result"
        parse_json: true
        timeout: 15
        command: |
          python3 - <<'EOF'
          import json
          from pathlib import Path

          output_dir = "{{output_dir}}"

          # Load topics from the file that save-topics wrote (avoids template
          # serialization issues with {{topics}} — Python repr vs JSON quotes)
          topics_path = Path(output_dir) / "topics.json"
          if not topics_path.exists():
              raise RuntimeError(f"No topics found at {topics_path} — did save-topics run?")
          topics = json.loads(topics_path.read_text())

          agent_names = ["code-tracer", "behavior-observer", "integration-mapper"]
          created = []

          for topic in topics:
              slug = topic.get("slug", "")
              if not slug:
                  continue
              # Per-topic agent directories
              for agent_name in agent_names:
                  agent_dir = Path(output_dir) / "modules" / slug / "agents" / agent_name
                  agent_dir.mkdir(parents=True, exist_ok=True)
              created.append(str(Path(output_dir) / "modules" / slug))

          print(json.dumps({"created_dirs": created, "topic_count": len(created)}))
          EOF

      # -----------------------------------------------------------------------
      # Step 2: Investigate topics — dispatch sub-recipe per topic
      # Runs discovery-investigate-topic.yaml for each selected topic.
      # Each invocation dispatches 2 agents (standard) or 3 agents (deep).
      # -----------------------------------------------------------------------
      - id: "investigate-topics"
        type: "recipe"
        foreach: "{{topics}}"
        as: "topic"
        recipe: "@dot-graph:recipes/discovery-investigate-topic.yaml"
        context:
          topic_name: "{{topic.name}}"
          topic_slug: "{{topic.slug}}"
          topic_description: "{{topic.description}}"
          fidelity: "{{fidelity}}"
          repo_path: "{{repo_path}}"
          output_dir: "{{output_dir}}"
        output: "investigation_results"
        timeout: 7200

  # ---------------------------------------------------------------------------
  # Stage 3: Synthesize — produce consensus diagrams and final manifest
  # ---------------------------------------------------------------------------
  - name: "synthesize"
    steps:
      # -----------------------------------------------------------------------
      # Step 1: Reconcile modules — synthesize per-topic agent findings
      # Runs discovery-synthesize-module.yaml for each topic to produce a
      # consensus diagram.dot and findings.md in each module directory.
      # -----------------------------------------------------------------------
      - id: "reconcile-modules"
        type: "recipe"
        foreach: "{{topics}}"
        as: "topic"
        recipe: "@dot-graph:recipes/discovery-synthesize-module.yaml"
        context:
          module_name: "{{topic.name}}"
          module_dir: "{{output_dir}}/modules/{{topic.slug}}"
          investigation_dir: "{{output_dir}}/modules/{{topic.slug}}"
          fidelity: "{{fidelity}}"
          output_dir: "{{output_dir}}"
        output: "reconciliation_results"
        timeout: 7200

      # -----------------------------------------------------------------------
      # Step 2: Subsystem synthesis — synthesize all topic findings into a
      # unified subsystem-level DOT diagram
      # -----------------------------------------------------------------------
      - id: "subsystem-synthesis"
        type: "recipe"
        recipe: "@dot-graph:recipes/synthesize-subsystem.yaml"
        context:
          subsystem_name: "topdown-discovery"
          module_dot_files: "[]"   # agents search output_dir for per-module diagram.dot files
          source_dirs: '["{{repo_path}}"]'   # repo root for boundary investigation
          output_dir: "{{output_dir}}"
        output: "subsystem_result"
        timeout: 3600

      # -----------------------------------------------------------------------
      # Step 3: Overview synthesis — produce final cross-subsystem overview
      # -----------------------------------------------------------------------
      - id: "overview-synthesis"
        type: "recipe"
        recipe: "@dot-graph:recipes/synthesize-overview.yaml"
        context:
          repo_root: "{{repo_path}}"   # needed so agent can examine top-level files
          subsystem_dot_files: '["{{output_dir}}/topdown-discovery.dot"]'
          output_dir: "{{output_dir}}"
        output: "overview_result"
        timeout: 3600

      # -----------------------------------------------------------------------
      # Step 4: Update metadata — write last-run.json
      # Records strategy, commit hash, timestamp, fidelity, and repo_path.
      # -----------------------------------------------------------------------
      - id: "update-metadata"
        type: "bash"
        output: "metadata_result"
        parse_json: true
        timeout: 10
        command: |
          python3 - <<'EOF'
          import json
          import subprocess
          from datetime import datetime, timezone
          from pathlib import Path

          output_dir = "{{output_dir}}"
          repo_path = "{{repo_path}}"
          fidelity = "{{fidelity}}"

          # Get current git commit
          try:
              commit_hash = subprocess.check_output(
                  ["git", "-C", repo_path, "rev-parse", "HEAD"],
                  text=True,
                  stderr=subprocess.DEVNULL,
              ).strip()
          except Exception:
              commit_hash = ""

          metadata = {
              "strategy": "topdown",
              "commit_hash": commit_hash,
              "timestamp": datetime.now(timezone.utc).isoformat(),
              "fidelity": fidelity,
              "repo_path": repo_path,
          }

          last_run_path = Path(output_dir) / "last-run.json"
          last_run_path.write_text(json.dumps(metadata, indent=2))
          print(json.dumps({"written": str(last_run_path), **metadata}))
          EOF

final_output: "metadata_result"
